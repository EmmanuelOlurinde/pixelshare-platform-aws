<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelShare</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; }
        form { margin-bottom: 30px; text-align: center; }
        .gallery { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
        .image-card { border: 1px solid #ddd; padding: 8px; border-radius: 6px; }
        .image-card img { max-width: 250px; height: auto; display: block; }
    </style>
</head>
<body>
    <h1>PixelShare</h1>

    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
        <input type="file" name="photo" accept="image/*" required>
        <button type="submit">Upload</button>
    </form>

    <div class="gallery">
        {% for image in images %}
            <div class="image-card">
                <a href="{{ url_for('image', filename=image) }}" target="_blank">
                    <img src="{{ url_for('image', filename=image) }}" alt="{{ image }}">
                </a>
                <p>{{ image }}</p>
            </div>
        {% else %}
            <p>No images uploaded yet.</p>
        {% endfor %}
    </div>
</body>
</html>
